name: MLOps CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  mlflow-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow
          pip install -r MLProject/requirements.txt
          pip install dvc
      - name: DVC pull data
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify dagshub password $DAGSHUB_TOKEN
          dvc pull
      - name: Run MLflow project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/roiskhoiron/Customer-Churn-EDA.mlflow
          MLFLOW_TRACKING_USERNAME: roiskhoiron
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: mlflow run MLProject --env-manager=local
